<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天文消消乐</title>
  <style>
    :root {
      --bg-1: #051221;
      --bg-2: #0b2240;
      --panel: rgba(6, 20, 40, 0.78);
      --text: #f3fbff;
      --accent: #59f0ff;
      --warn: #ffd166;
      --danger: #ff6b6b;
      --ok: #70e000;
      --grid-size: 8;
      --cell-size: min(9.4vw, 64px);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(67, 154, 255, 0.28), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(119, 0, 255, 0.24), transparent 35%),
        linear-gradient(150deg, var(--bg-1), var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 34% 63%, rgba(255,255,255,0.75), transparent),
        radial-gradient(1.8px 1.8px at 60% 15%, rgba(255,255,255,0.65), transparent),
        radial-gradient(1.5px 1.5px at 82% 40%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.8px 1.8px at 25% 86%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.4px 1.4px at 72% 72%, rgba(255,255,255,0.65), transparent);
      animation: twinkle 4.5s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }

    .app {
      width: min(96vw, 760px);
      background: var(--panel);
      border: 1px solid rgba(121, 196, 255, 0.24);
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
      padding: 16px;
      backdrop-filter: blur(6px);
    }

    .top {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3.5vw, 32px);
      letter-spacing: 1px;
      color: var(--accent);
      text-shadow: 0 0 14px rgba(89,240,255,0.4);
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 14px;
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(123, 203, 255, 0.4);
      background: rgba(5, 22, 40, 0.68);
    }

    .tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    button {
      cursor: pointer;
      border: 1px solid rgba(139, 211, 255, 0.45);
      color: var(--text);
      background: linear-gradient(180deg, rgba(20,56,98,0.95), rgba(9,28,50,0.95));
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      transition: transform .12s ease, box-shadow .2s ease, border-color .2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(162, 236, 255, 0.95);
      box-shadow: 0 6px 16px rgba(58, 155, 255, 0.24);
    }

    button.active {
      border-color: var(--warn);
      box-shadow: 0 0 0 2px rgba(255,209,102,0.25) inset;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
      box-shadow: none;
    }

    .msg {
      min-height: 22px;
      margin-bottom: 10px;
      color: #b8f7ff;
      font-size: 14px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(var(--grid-size), var(--cell-size));
      grid-template-rows: repeat(var(--grid-size), var(--cell-size));
      gap: 6px;
      width: fit-content;
      margin: 0 auto;
      padding: 10px;
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(11, 41, 74, 0.9), rgba(7, 22, 41, 0.9));
      border: 1px solid rgba(116, 195, 255, 0.25);
      box-shadow: inset 0 0 20px rgba(16, 91, 170, 0.24);
      user-select: none;
      touch-action: manipulation;
    }

    .cell {
      border-radius: 12px;
      border: 1px solid rgba(160, 225, 255, 0.15);
      display: grid;
      place-items: center;
      font-size: clamp(22px, 4.4vw, 30px);
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.28), rgba(255,255,255,0.02) 45%), rgba(5, 25, 47, 0.8);
      transition: transform .12s ease, box-shadow .2s ease;
    }

    .cell.selected {
      transform: scale(1.07);
      box-shadow: 0 0 0 2px rgba(255, 209, 102, 0.65), 0 0 18px rgba(255, 209, 102, 0.28);
    }

    .cell.matching {
      animation: pop .28s ease;
    }

    .cell.supernova {
      animation: nova .45s ease;
    }

    .cell.blackhole {
      animation: suck .5s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes nova {
      0% { box-shadow: 0 0 0 0 rgba(255,99,71,0.8); }
      100% { box-shadow: 0 0 0 26px rgba(255,99,71,0); }
    }

    @keyframes suck {
      0% { transform: scale(1); }
      100% { transform: scale(0.25) rotate(210deg); opacity: 0.2; }
    }

    .legend {
      margin-top: 12px;
      font-size: 13px;
      opacity: 0.93;
      line-height: 1.5;
    }

    .legend b { color: #d8f6ff; }
  </style>
</head>
<body>
  <div class="stars"></div>
  <main class="app">
    <div class="top">
      <h1>天文消消乐</h1>
      <div class="stats">
        <div class="chip">分数: <span id="score">0</span></div>
        <div class="chip">连击: <span id="combo">0</span></div>
        <div class="chip">剩余步数: <span id="moves">30</span></div>
      </div>
    </div>

    <div class="tools">
      <button id="supernovaBtn">超新星 x<span id="novaCount">2</span></button>
      <button id="blackholeBtn">黑洞 x<span id="holeCount">2</span></button>
      <button id="restartBtn">重新开局</button>
    </div>

    <div class="msg" id="message">点击两个相邻星体交换，凑齐 3 个及以上即可消除。</div>

    <section class="board" id="board" aria-label="游戏棋盘"></section>

    <div class="legend">
      <div><b>星体类型：</b>🌕 行星、🌟 恒星、☄️ 彗星、🪐 环星、🌌 星云、🌠 流星</div>
      <div><b>超新星：</b>点击道具后，再点棋盘任意格，炸掉 3x3 范围。</div>
      <div><b>黑洞：</b>点击道具后，再点棋盘任意格，吸收十字范围（中心+上下左右各两格）。</div>
    </div>
  </main>

  <script>
    const SIZE = 8;
    const STAR_TYPES = ["🌕", "🌟", "☄️", "🪐", "🌌", "🌠"];

    const state = {
      board: [],
      selected: null,
      score: 0,
      combo: 0,
      moves: 30,
      tools: {
        supernova: 2,
        blackhole: 2,
      },
      activeTool: null,
      busy: false,
    };

    const boardEl = document.getElementById("board");
    const scoreEl = document.getElementById("score");
    const comboEl = document.getElementById("combo");
    const movesEl = document.getElementById("moves");
    const messageEl = document.getElementById("message");
    const supernovaBtn = document.getElementById("supernovaBtn");
    const blackholeBtn = document.getElementById("blackholeBtn");
    const restartBtn = document.getElementById("restartBtn");
    const novaCountEl = document.getElementById("novaCount");
    const holeCountEl = document.getElementById("holeCount");

    function randomStar() {
      return STAR_TYPES[Math.floor(Math.random() * STAR_TYPES.length)];
    }

    function makeBoard() {
      const arr = Array.from({ length: SIZE }, () => Array.from({ length: SIZE }, () => randomStar()));

      // 初始化时避免直接出现消除
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          while (
            (c >= 2 && arr[r][c] === arr[r][c - 1] && arr[r][c] === arr[r][c - 2]) ||
            (r >= 2 && arr[r][c] === arr[r - 1][c] && arr[r][c] === arr[r - 2][c])
          ) {
            arr[r][c] = randomStar();
          }
        }
      }
      return arr;
    }

    function inBoard(r, c) {
      return r >= 0 && r < SIZE && c >= 0 && c < SIZE;
    }

    function render() {
      boardEl.innerHTML = "";
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          if (state.selected && state.selected.r === r && state.selected.c === c) {
            cell.classList.add("selected");
          }
          cell.dataset.r = r;
          cell.dataset.c = c;
          cell.textContent = state.board[r][c] || "";
          boardEl.appendChild(cell);
        }
      }

      scoreEl.textContent = String(state.score);
      comboEl.textContent = String(state.combo);
      movesEl.textContent = String(state.moves);
      novaCountEl.textContent = String(state.tools.supernova);
      holeCountEl.textContent = String(state.tools.blackhole);

      supernovaBtn.classList.toggle("active", state.activeTool === "supernova");
      blackholeBtn.classList.toggle("active", state.activeTool === "blackhole");

      const gameOver = state.moves <= 0;
      supernovaBtn.disabled = state.tools.supernova <= 0 || gameOver;
      blackholeBtn.disabled = state.tools.blackhole <= 0 || gameOver;
    }

    function setMessage(msg) {
      messageEl.textContent = msg;
    }

    function swap(a, b) {
      const tmp = state.board[a.r][a.c];
      state.board[a.r][a.c] = state.board[b.r][b.c];
      state.board[b.r][b.c] = tmp;
    }

    function isAdjacent(a, b) {
      return Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1;
    }

    function findMatches() {
      const marked = new Set();

      // 横向
      for (let r = 0; r < SIZE; r++) {
        let streak = 1;
        for (let c = 1; c <= SIZE; c++) {
          const same = c < SIZE && state.board[r][c] && state.board[r][c] === state.board[r][c - 1];
          if (same) {
            streak++;
          } else {
            if (streak >= 3) {
              for (let k = c - streak; k < c; k++) {
                marked.add(`${r},${k}`);
              }
            }
            streak = 1;
          }
        }
      }

      // 纵向
      for (let c = 0; c < SIZE; c++) {
        let streak = 1;
        for (let r = 1; r <= SIZE; r++) {
          const same = r < SIZE && state.board[r][c] && state.board[r][c] === state.board[r - 1][c];
          if (same) {
            streak++;
          } else {
            if (streak >= 3) {
              for (let k = r - streak; k < r; k++) {
                marked.add(`${k},${c}`);
              }
            }
            streak = 1;
          }
        }
      }

      return Array.from(marked).map((m) => {
        const [r, c] = m.split(",").map(Number);
        return { r, c };
      });
    }

    function animateCells(positions, className) {
      const nodeList = Array.from(boardEl.children);
      for (const { r, c } of positions) {
        const idx = r * SIZE + c;
        if (nodeList[idx]) {
          nodeList[idx].classList.add(className);
        }
      }
    }

    function clearCells(positions) {
      for (const { r, c } of positions) {
        state.board[r][c] = null;
      }
    }

    function collapseAndRefill() {
      for (let c = 0; c < SIZE; c++) {
        let write = SIZE - 1;
        for (let r = SIZE - 1; r >= 0; r--) {
          if (state.board[r][c]) {
            state.board[write][c] = state.board[r][c];
            write--;
          }
        }
        while (write >= 0) {
          state.board[write][c] = randomStar();
          write--;
        }
      }
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function resolveBoard(extraMultiplier = 1) {
      let chain = 0;
      while (true) {
        const matches = findMatches();
        if (matches.length === 0) {
          if (chain === 0) {
            state.combo = 0;
          }
          render();
          return;
        }

        chain++;
        state.combo = chain;
        const gain = matches.length * 10 * chain * extraMultiplier;
        state.score += gain;

        if (matches.length >= 5) {
          state.tools.supernova += 1;
          setMessage(`星系共振！一次消除 ${matches.length} 个，获得 1 个超新星。`);
        } else if (matches.length >= 4) {
          state.tools.blackhole += 1;
          setMessage(`引力增强！一次消除 ${matches.length} 个，获得 1 个黑洞。`);
        } else {
          setMessage(`消除了 ${matches.length} 个星体，连击 x${chain}！`);
        }

        render();
        animateCells(matches, "matching");
        await sleep(220);

        clearCells(matches);
        collapseAndRefill();
        render();
        await sleep(170);
      }
    }

    function endTurn() {
      if (state.moves <= 0) {
        state.activeTool = null;
        state.selected = null;
        setMessage(`宇宙观测结束！最终得分 ${state.score}。点击“重新开局”再来一局。`);
      }
      render();
    }

    async function doSwapAction(from, to) {
      if (state.busy) return;
      if (state.moves <= 0) {
        endTurn();
        return;
      }

      state.busy = true;
      swap(from, to);
      render();
      await sleep(120);

      const matches = findMatches();
      if (matches.length === 0) {
        swap(from, to);
        render();
        setMessage("这次交换没有形成三消，已回退。");
        state.selected = null;
        state.busy = false;
        return;
      }

      state.moves -= 1;
      state.selected = null;
      await resolveBoard(1);
      state.busy = false;
      endTurn();
    }

    function collectSupernovaArea(center) {
      const targets = [];
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const r = center.r + dr;
          const c = center.c + dc;
          if (inBoard(r, c)) targets.push({ r, c });
        }
      }
      return targets;
    }

    function collectBlackholeArea(center) {
      const targets = [];
      const dirs = [
        [0, 0],
        [1, 0], [2, 0], [-1, 0], [-2, 0],
        [0, 1], [0, 2], [0, -1], [0, -2],
      ];
      for (const [dr, dc] of dirs) {
        const r = center.r + dr;
        const c = center.c + dc;
        if (inBoard(r, c)) targets.push({ r, c });
      }
      return targets;
    }

    async function useTool(pos) {
      if (state.busy || !state.activeTool || state.moves <= 0) return;
      state.busy = true;

      let targets = [];
      let cls = "matching";
      if (state.activeTool === "supernova") {
        if (state.tools.supernova <= 0) {
          state.activeTool = null;
          state.busy = false;
          render();
          return;
        }
        state.tools.supernova -= 1;
        targets = collectSupernovaArea(pos);
        cls = "supernova";
        setMessage("超新星爆发！周围星体被冲击消除。");
      } else if (state.activeTool === "blackhole") {
        if (state.tools.blackhole <= 0) {
          state.activeTool = null;
          state.busy = false;
          render();
          return;
        }
        state.tools.blackhole -= 1;
        targets = collectBlackholeArea(pos);
        cls = "blackhole";
        setMessage("黑洞吸积！目标区域星体被吞噬。");
      }

      state.activeTool = null;
      state.moves -= 1;
      render();
      animateCells(targets, cls);
      await sleep(260);

      clearCells(targets);
      collapseAndRefill();
      render();
      await sleep(120);

      // 道具也可以触发连锁消除，额外倍率稍高
      await resolveBoard(2);
      state.busy = false;
      endTurn();
    }

    function parseCellFromEvent(target) {
      const cell = target.closest(".cell");
      if (!cell) return null;
      return { r: Number(cell.dataset.r), c: Number(cell.dataset.c) };
    }

    boardEl.addEventListener("click", async (event) => {
      const pos = parseCellFromEvent(event.target);
      if (!pos || state.busy || state.moves <= 0) return;

      if (state.activeTool) {
        await useTool(pos);
        return;
      }

      if (!state.selected) {
        state.selected = pos;
        setMessage("已选择第一个星体，请选择相邻星体交换，或者使用道具。");
        render();
        return;
      }

      if (state.selected.r === pos.r && state.selected.c === pos.c) {
        state.selected = null;
        setMessage("已取消选择。");
        render();
        return;
      }

      if (!isAdjacent(state.selected, pos)) {
        state.selected = pos;
        setMessage("只能交换相邻格子，已切换为新选中的星体。");
        render();
        return;
      }

      await doSwapAction(state.selected, pos);
    });

    supernovaBtn.addEventListener("click", () => {
      if (state.tools.supernova <= 0 || state.moves <= 0 || state.busy) return;
      state.activeTool = state.activeTool === "supernova" ? null : "supernova";
      state.selected = null;
      setMessage(state.activeTool ? "超新星已激活：点击棋盘目标位置引爆。" : "已取消超新星。");
      render();
    });

    blackholeBtn.addEventListener("click", () => {
      if (state.tools.blackhole <= 0 || state.moves <= 0 || state.busy) return;
      state.activeTool = state.activeTool === "blackhole" ? null : "blackhole";
      state.selected = null;
      setMessage(state.activeTool ? "黑洞已激活：点击棋盘目标位置吸收方块。" : "已取消黑洞。");
      render();
    });

    restartBtn.addEventListener("click", init);

    function init() {
      state.board = makeBoard();
      state.selected = null;
      state.score = 0;
      state.combo = 0;
      state.moves = 30;
      state.tools.supernova = 2;
      state.tools.blackhole = 2;
      state.activeTool = null;
      state.busy = false;
      setMessage("点击两个相邻星体交换，凑齐 3 个及以上即可消除。");
      render();
    }

    init();
  </script>
</body>
</html>
